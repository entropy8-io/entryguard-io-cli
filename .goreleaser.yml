project_name: eg

builds:
  - id: eg
    main: .
    binary: eg
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: eg-agent
    main: ./cmd/eg-agent
    binary: eg-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: eg-archive
    builds:
      - eg
    format: tar.gz
    name_template: "eg_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

  - id: eg-agent-archive
    builds:
      - eg-agent
    format: tar.gz
    name_template: "eg-agent_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

dockers:
  - id: eg-agent-amd64
    ids:
      - eg-agent
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.agent
    image_templates:
      - "ghcr.io/entropy8-io/eg-agent:{{ .Version }}-amd64"
      - "ghcr.io/entropy8-io/eg-agent:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: eg-agent-arm64
    ids:
      - eg-agent
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.agent
    image_templates:
      - "ghcr.io/entropy8-io/eg-agent:{{ .Version }}-arm64"
      - "ghcr.io/entropy8-io/eg-agent:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/entropy8-io/eg-agent:{{ .Version }}"
    image_templates:
      - "ghcr.io/entropy8-io/eg-agent:{{ .Version }}-amd64"
      - "ghcr.io/entropy8-io/eg-agent:{{ .Version }}-arm64"

  - name_template: "ghcr.io/entropy8-io/eg-agent:latest"
    image_templates:
      - "ghcr.io/entropy8-io/eg-agent:latest-amd64"
      - "ghcr.io/entropy8-io/eg-agent:latest-arm64"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: entropy8-io
    name: entryguard-io-cli
